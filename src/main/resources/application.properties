# Daily German Coach API - Application Configuration
# Real secrets should be set via environment variables

# AI Provider Configuration (Gemini)
ai.provider.url=${AI_PROVIDER_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}
ai.provider.key=${AI_PROVIDER_KEY:}
ai.provider.type=gemini
ai.provider.useKeyQuery=${AI_PROVIDER_USE_KEY_QUERY:true}
ai.provider.useSdk=${AI_PROVIDER_USE_SDK:false}

# GCP Configuration (for SDK mode)
gcp.project.id=${GCP_PROJECT_ID:}
gcp.location=${GCP_LOCATION:us-central1}

# H2 Database (in-memory for development)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Logging
logging.level.com.dailygermancoach=INFO
logging.level.org.springframework.web=INFO
